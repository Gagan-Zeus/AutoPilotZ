<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Typeform Fixture</title>
  </head>
  <body>
    <main data-qa="form-container">
      <h1>Typeform candidate survey</h1>
      <section data-qa="block" aria-label="Tell us about yourself">
        <label for="tf-full-name">What is your full name?</label>
        <input id="tf-full-name" name="fullName" placeholder="Type your answer" />
      </section>
      <section data-qa="block" aria-label="Portfolio">
        <label for="tf-portfolio">Portfolio URL</label>
        <input id="tf-portfolio" name="portfolio" type="url" placeholder="https://example.com" />
      </section>
      <section data-qa="block" aria-label="Summary">
        <label for="tf-summary">Short bio</label>
        <textarea id="tf-summary" name="summary" placeholder="Type your answer"></textarea>
      </section>
    </main>
  </body>
</html>
